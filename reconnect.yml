name: Reconnect Worker to KV

on:
  workflow_dispatch:

jobs:
  reconnect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install node-fetch@2 form-data

      - name: Reconnect Worker
        run: node cf_setup.js
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
